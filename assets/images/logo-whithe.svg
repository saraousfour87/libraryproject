<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- Fond du livre (blanc) -->
    <rect x="40" y="30" width="120" height="140" rx="8" fill="white" stroke="#ecf0f1" stroke-width="2"/>
    
    <!-- Pages du livre -->
    <rect x="45" y="35" width="110" height="130" rx="4" fill="#f8f9fa"/>
    
    <!-- Lignes de texte -->
    <line x1="55" y1="60" x2="140" y2="60" stroke="#e9ecef" stroke-width="2"/>
    <line x1="55" y1="80" x2="140" y2="80" stroke="#e9ecef" stroke-width="2"/>
    <line x1="55" y1="100" x2="140" y2="100" stroke="#e9ecef" stroke-width="2"/>
    <line x1="55" y1="120" x2="120" y2="120" stroke="#e9ecef" stroke-width="2"/>
    
    <!-- Dos du livre -->
    <rect x="30" y="40" width="15" height="120" rx="4" fill="#dee2e6"/>
    
    <!-- Titre sur le dos -->
    <text x="32" y="100" transform="rotate(90, 32, 100)" fill="#2c3e50" font-size="12" font-family="Arial">Library</text>
    
    <!-- Marque-page rouge -->
    <path d="M160 70 L170 70 L170 140 L160 130 Z" fill="#e74c3c"/>
    
    <!-- Étoile -->
    <circle cx="160" cy="50" r="15" fill="#f1c40f"/>
    <text x="155" y="58" fill="#2c3e50" font-size="16" font-family="Arial" font-weight="bold">★</text>
</svg>