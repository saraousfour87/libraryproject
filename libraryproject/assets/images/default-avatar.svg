<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- Fond circulaire -->
    <circle cx="100" cy="100" r="90" fill="#3498db" stroke="#2980b9" stroke-width="4"/>
    
    <!-- Tête -->
    <circle cx="100" cy="80" r="35" fill="white" stroke="#bdc3c7" stroke-width="2"/>
    
    <!-- Yeux -->
    <circle cx="80" cy="75" r="5" fill="#2c3e50"/>
    <circle cx="120" cy="75" r="5" fill="#2c3e50"/>
    
    <!-- Sourire -->
    <path d="M80 95 Q100 110, 120 95" stroke="#2c3e50" stroke-width="3" fill="none"/>
    
    <!-- Corps (haut) -->
    <rect x="70" y="115" width="60" height="45" fill="white" stroke="#bdc3c7" stroke-width="2"/>
    
    <!-- Livre dans les mains -->
    <rect x="90" y="130" width="30" height="20" rx="2" fill="#e74c3c"/>
    <line x1="95" y1="135" x2="115" y2="135" stroke="white" stroke-width="1"/>
    <line x1="95" y1="140" x2="115" y2="140" stroke="white" stroke-width="1"/>
    <line x1="95" y1="145" x2="110" y2="145" stroke="white" stroke-width="1"/>
    
    <!-- Initiales LP -->
    <text x="85" y="185" fill="white" font-size="24" font-family="Arial" font-weight="bold">LP</text>
</svg>